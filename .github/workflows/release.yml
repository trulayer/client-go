name: release
on:
  push:
    tags:
      - 'v*.*.*'
      - 'instruments/anthropic/v*.*.*'
      - 'instruments/openai/v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.2.0, instruments/openai/v0.2.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # For workflow_dispatch the tag doesn't exist yet — check out main
          # so the next step can create and push it. For tag-push events,
          # github.ref already points to the tag.
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Determine module and version
        run: |
          TAG=${{ github.event.inputs.tag || github.ref_name }}
          if [[ $TAG == instruments/anthropic/* ]]; then
            echo "MODULE=github.com/trulayer/client-go/instruments/anthropic" >> $GITHUB_ENV
            echo "VERSION=${TAG#instruments/anthropic/}" >> $GITHUB_ENV
          elif [[ $TAG == instruments/openai/* ]]; then
            echo "MODULE=github.com/trulayer/client-go/instruments/openai" >> $GITHUB_ENV
            echo "VERSION=${TAG#instruments/openai/}" >> $GITHUB_ENV
          else
            echo "MODULE=github.com/trulayer/client-go" >> $GITHUB_ENV
            echo "VERSION=$TAG" >> $GITHUB_ENV
          fi
      - name: Create and push tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ github.event.inputs.tag }}"
          git push origin "${{ github.event.inputs.tag }}"
      - name: Ping Go proxy
        run: GOPROXY=proxy.golang.org go list -m ${MODULE}@${VERSION}

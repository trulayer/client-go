name: release
on:
  push:
    tags: ['v*.*.*']

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: GOPROXY=proxy.golang.org go list -m github.com/trulayer/client-go@${GITHUB_REF_NAME}

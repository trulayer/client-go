version: "2"

run:
  timeout: 3m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - misspell
    - revive
  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
            - "disableStutteringCheck"

formatters:
  enable:
    - gofmt
    - goimports

issues:
  exclude-dirs:
    - trulayer_test
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - revive
